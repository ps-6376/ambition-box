<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 30px 0;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin: 0 auto; /* center horizontally */
            background-color: #ffffff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: #1e88e5;
            color: #ffffff;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            font-size: 16px;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #e3f2fd;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Company Name</th>
                <th>Location</th>
                <th>Rating</th>
                <th>Company Type</th>
                <th>other location</th>
            </tr>
        </thead>
        <tbody>
            {% for i in d.index %}
               <tr>
                   <td>{{d.loc[i,"company name"]}}</td>
                   <td>{{d.loc[i,"ratings"]}}</td>
                   <td>{{d.loc[i,"company_type"]}}</td>
                   <td>{{d.loc[i,"location"]}}</td>
                   <td>{{d.loc[i,"other_loc"]}}</td>
               </tr>
            {% endfor %}
       </tbody>
    </table>

</body>
</html>
